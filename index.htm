<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Documents</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --muted: #8fa3c8;
      --text: #e8eefc;
      --accent: #6ea8fe;
      --border: #22335f;
    }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 10% 0%, #0f1b3f, var(--bg)); color: var(--text);
      min-height: 100vh; display: grid; place-items: start center; padding: 24px;
    }
    .container { width: min(1100px, 100%); }
    .card { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35); overflow: hidden; }
    header { padding: 20px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    h1 { font-size: 1.25rem; margin: 0; letter-spacing: .2px; }
    h2 { font-size: 1rem; margin: 0; padding: 16px 16px 8px; color: var(--accent); letter-spacing: .3px; }
    .muted { color: var(--muted); font-size: .9rem; }
    .toolbar { padding: 14px 16px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .search { flex:1; background: #0c1533; border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; }
    table { width: 100%; border-collapse: collapse; }
    tbody td { border-bottom: 1px solid #0f1b3b; padding: 12px; font-size: .95rem; }
    tbody tr:hover { background: rgba(110,168,254,0.06); }
    .name { font-family: ui-monospace, monospace; }
    .nowrap { white-space: nowrap; }
    .mutedRow { color: var(--muted); text-align:center; padding:20px; }
    a { color: var(--accent); }

    /* Écran mot de passe */
    #gate { display: grid; place-items: center; min-height: 60vh; }
    .gateCard { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35); padding: 32px; text-align: center; width: min(360px, 90vw); }
    .gateCard h1 { margin-bottom: 18px; }
    #pw { width: 100%; box-sizing: border-box; background: #0c1533; border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px; font-size: 1.1rem; text-align: center; letter-spacing: .3em; margin-bottom: 12px; }
    #pwBtn { width: 100%; background: var(--accent); color: #0b1020; border: none; border-radius: 10px; padding: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    #pwBtn:hover { filter: brightness(1.1); }
    #pwErr { color: #ff8a8a; font-size: .9rem; min-height: 1.2em; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <div id="gate">
      <div class="gateCard">
        <h1>Saisissez le mot de passe</h1>
        <input id="pw" type="password" autocomplete="off" autofocus />
        <button id="pwBtn">Entrer</button>
        <div id="pwErr"></div>
      </div>
    </div>

    <div id="site" class="card" hidden>
      <header>
        <h1>Documents</h1>
        <span class="muted">Cliquez sur « Voir » pour ouvrir un document, ou « Télécharger » pour l'enregistrer.</span>
      </header>
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="Rechercher un document…" />
      </div>
      <div style="max-height: 70vh; overflow: auto;">
        <div id="sections">
          <div class="mutedRow">Chargement…</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ----- Mot de passe -----
    const PW_HASH = "468c7b6449dd928f2ddad069fbfdb31f59ce214d67a1422c7610efb886ce6aa7";
    const gate = document.getElementById('gate');
    const site = document.getElementById('site');
    const pw = document.getElementById('pw');
    const pwErr = document.getElementById('pwErr');

    async function sha256Hex(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function unlock() {
      gate.style.display = 'none';
      site.hidden = false;
      loadAll();
    }

    async function checkPassword() {
      const hash = await sha256Hex(pw.value.trim());
      if (hash === PW_HASH) {
        sessionStorage.setItem('unlocked', '1');
        unlock();
      } else {
        pwErr.textContent = 'Mot de passe incorrect.';
        pw.value = '';
        pw.focus();
      }
    }

    document.getElementById('pwBtn').addEventListener('click', checkPassword);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

    // ----- Liste des documents -----
    const uname = "rabergeau";
    const repo = "rabergeau.github.io";
    const FOLDERS = [
      { path: "citya", title: "Citya — Copropriété" },
      { path: "roy",   title: "Roy — Succession" }
    ];

    const sectionsEl = document.getElementById('sections');
    const searchEl = document.getElementById('search');
    let sections = [];
    let loaded = false;

    async function loadAll() {
      if (loaded) return;
      loaded = true;
      try {
        sections = await Promise.all(FOLDERS.map(async f => {
          const res = await fetch(`https://api.github.com/repos/${uname}/${repo}/contents/${f.path}`);
          if (!res.ok) throw new Error("GitHub API error");
          const data = await res.json();
          const files = data
            .filter(item => item.name.toLowerCase().endsWith('.pdf'))
            .map(item => ({ name: item.name, view: `https://${repo}/${f.path}/${item.name}`, download: item.download_url }));
          files.sort((a, b) => a.name.localeCompare(b.name));
          return { title: f.title, files };
        }));
        render();
      } catch (e) {
        console.error(e);
        sectionsEl.innerHTML = '<div class="mutedRow">Erreur lors du chargement des fichiers.</div>';
      }
    }

    function render() {
      const q = searchEl.value.trim().toLowerCase();
      const frag = document.createDocumentFragment();
      let any = false;

      for (const s of sections) {
        const files = q ? s.files.filter(f => f.name.toLowerCase().includes(q)) : s.files;
        if (!files.length) continue;
        any = true;

        const h2 = document.createElement('h2');
        h2.textContent = s.title;
        frag.appendChild(h2);

        const table = document.createElement('table');
        const tbody = document.createElement('tbody');
        for (const f of files) {
          const tr = document.createElement('tr');
          const tdName = document.createElement('td');
          tdName.className = 'name';
          tdName.textContent = f.name;
          const tdLinks = document.createElement('td');
          tdLinks.className = 'nowrap';
          tdLinks.innerHTML = `<a href="${f.view}" target="_blank">Voir</a>&nbsp;&nbsp;&nbsp;<a href="${f.download}" target="_blank">Télécharger</a>`;
          tr.append(tdName, tdLinks);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        frag.appendChild(table);
      }

      if (!any) {
        sectionsEl.innerHTML = '<div class="mutedRow">Aucun document trouvé.</div>';
        return;
      }
      sectionsEl.replaceChildren(frag);
    }

    searchEl.addEventListener('input', render);

    if (sessionStorage.getItem('unlocked') === '1') unlock();
  </script>
</body>
</html>
