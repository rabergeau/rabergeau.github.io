<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Accueil</title>
  <style>
    :root {
      --bg: #0b1020;
      --muted: #8fa3c8;
      --text: #e8eefc;
      --accent: #6ea8fe;
      --border: #22335f;
    }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 10% 0%, #0f1b3f, var(--bg)); color: var(--text);
      min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    .container { width: min(600px, 100%); text-align: center; }
    h1 { font-size: 1.6rem; letter-spacing: .2px; margin: 0 0 8px; }
    .muted { color: var(--muted); margin: 0 0 28px; }
    .section {
      display: block; text-decoration: none; color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35);
      padding: 26px; transition: border-color .15s, transform .15s;
    }
    .section:hover { border-color: var(--accent); transform: translateY(-2px); }
    .section h2 { margin: 0 0 6px; font-size: 1.15rem; color: var(--accent); }
    .section p { margin: 0; color: var(--muted); font-size: .95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenue</h1>
    <p class="muted">Espace de documents</p>
    <a class="section" href="/citya/">
      <h2>Citya — Syndic</h2>
      <p>Documents du syndic (accès protégé par mot de passe)</p>
    </a>
  </div>
</body>
</html>
