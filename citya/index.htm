<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Citya Syndic</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128193;</text></svg>" />
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --muted: #8fa3c8;
      --text: #e8eefc;
      --accent: #6ea8fe;
      --border: #22335f;
    }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 10% 0%, #0f1b3f, var(--bg)); color: var(--text);
      min-height: 100vh; display: grid; place-items: start center; padding: 24px;
    }
    .container { width: min(1100px, 100%); }
    .card { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35); overflow: hidden; }
    header { padding: 20px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .contact { font-weight: 600; }
    h1 { font-size: 1.25rem; margin: 0; letter-spacing: .2px; }
    .muted { color: var(--muted); font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #0f1836; border-bottom: 1px solid var(--border); text-align: left; padding: 12px; font-size: .9rem; color: var(--muted); }
    tbody td { border-bottom: 1px solid #0f1b3b; padding: 12px; font-size: .95rem; }
    tbody tr:hover { background: rgba(110,168,254,0.06); }
    .name { font-family: ui-monospace, monospace; width: 100%; }
    .nowrap { white-space: nowrap; }
    td.nowrap { text-align: right; }
    .size { text-align: right; white-space: nowrap; }
    td.size { color: var(--muted); }
    .mutedRow { color: var(--muted); text-align:center; padding:20px; }
    a { color: var(--accent); }

    @media (max-width: 640px) {
      body { padding: 10px; }
      header { padding: 14px; }
      h1 { font-size: 1rem; }
      thead th, tbody td { padding: 8px 6px; font-size: .85rem; }
      .name { word-break: break-all; font-size: .8rem; }
    }

    /* Écran mot de passe */
    #gate { display: grid; place-items: center; min-height: 60vh; }
    .gateCard { background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.35); padding: 32px; text-align: center; width: min(360px, 90vw); }
    .gateCard h1 { margin-bottom: 18px; }
    #pw { width: 100%; box-sizing: border-box; background: #0c1533; border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px; font-size: 1.1rem; text-align: center; margin-bottom: 12px; }
    #pwBtn { width: 100%; background: var(--accent); color: #0b1020; border: none; border-radius: 10px; padding: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    #pwBtn:hover { filter: brightness(1.1); }
    #pwErr { color: #ff8a8a; font-size: .9rem; min-height: 1.2em; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">

    <div id="gate">
      <div class="gateCard">
        <h1>Saisissez le mot de passe</h1>
        <input id="pw" type="password" autocomplete="off" autofocus />
        <button id="pwBtn">Entrer</button>
        <div id="pwErr"></div>
      </div>
    </div>

    <div id="site" class="card" hidden>
      <header>
        <div>
          <h1>Citya Syndic</h1>
          <p class="muted" style="margin: 6px 0 0;">Cliquez sur « View » pour ouvrir un document, ou « Download » pour l'enregistrer.</p>
        </div>
        <div class="contact">Contact : Philippe Rabergeau <span class="nowrap">06.72.30.85.95</span></div>
      </header>
      <table>
        <thead>
          <tr><th>Document</th><th></th><th class="size">Taille</th></tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="3" class="mutedRow">Chargement…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // ----- Mot de passe -----
    const PW_HASH = "468c7b6449dd928f2ddad069fbfdb31f59ce214d67a1422c7610efb886ce6aa7";
    const gate = document.getElementById('gate');
    const site = document.getElementById('site');
    const pw = document.getElementById('pw');
    const pwErr = document.getElementById('pwErr');

    async function sha256Hex(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function unlock() {
      gate.style.display = 'none';
      site.hidden = false;
      loadFiles();
    }

    async function checkPassword() {
      const hash = await sha256Hex(pw.value.trim());
      if (hash === PW_HASH) {
        sessionStorage.setItem('unlocked-citya', '1');
        unlock();
      } else {
        pwErr.textContent = 'Mot de passe incorrect.';
        pw.value = '';
        pw.focus();
      }
    }

    document.getElementById('pwBtn').addEventListener('click', checkPassword);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

    // ----- Liste des documents -----
    const uname = "rabergeau";
    const repo = "rabergeau.github.io";
    const path = "citya";

    const tbody = document.getElementById('tbody');
    let loaded = false;

    function fmtSize(bytes) {
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(1).replace('.', ',') + ' M';
      return Math.max(1, Math.round(bytes / 1024)) + ' K';
    }

    async function fetchList() {
      try {
        const res = await fetch('files.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('files.json missing');
        return await res.json();
      } catch (e) {
        const res = await fetch(`https://api.github.com/repos/${uname}/${repo}/contents/${path}`);
        if (!res.ok) throw new Error("GitHub API error");
        return await res.json();
      }
    }

    async function loadFiles() {
      if (loaded) return;
      loaded = true;
      try {
        const data = await fetchList();
        const rows = data
          .filter(item => item.name.toLowerCase().endsWith('.pdf'))
          .map(item => ({ name: item.name, size: item.size, view: `https://${repo}/${path}/${item.name}` }));
        rows.sort((a, b) => a.name.localeCompare(b.name));

        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="mutedRow">Aucun document trouvé.</td></tr>';
          return;
        }
        const frag = document.createDocumentFragment();
        for (const r of rows) {
          const tr = document.createElement('tr');
          const tdName = document.createElement('td');
          tdName.className = 'name';
          tdName.textContent = r.name;
          const tdLinks = document.createElement('td');
          tdLinks.className = 'nowrap';
          tdLinks.innerHTML = `<a href="${r.view}" target="_blank">View</a>&nbsp;&nbsp;&nbsp;<a href="${r.view}" download>Download</a>`;
          const tdSize = document.createElement('td');
          tdSize.className = 'size';
          tdSize.textContent = fmtSize(r.size);
          tr.append(tdName, tdLinks, tdSize);
          frag.appendChild(tr);
        }
        tbody.replaceChildren(frag);
      } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="3" class="mutedRow">Impossible de charger la liste des documents. Veuillez réessayer dans quelques minutes.</td></tr>';
      }
    }

    if (sessionStorage.getItem('unlocked-citya') === '1') unlock();
  </script>
</body>
</html>
